<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Redirecting...</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#050505;
  color:#fff;
  font-family:system-ui;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* background glow */
.bg{
  position:absolute;
  inset:-40%;
  background:
    radial-gradient(circle at 30% 30%,rgba(0,200,255,.18),transparent 40%),
    radial-gradient(circle at 70% 60%,rgba(255,0,180,.12),transparent 45%);
  animation:move 6s infinite alternate ease-in-out;
  filter:blur(30px);
}

@keyframes move{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(40px,-30px) scale(1.2)}
}

/* particles */
.p{
  position:absolute;
  width:4px;
  height:4px;
  background:#fff;
  border-radius:50%;
  animation:fall linear infinite;
  opacity:.5;
}

@keyframes fall{
  0%{transform:translateY(-10vh)}
  100%{transform:translateY(110vh)}
}

/* center box */
.box{
  z-index:2;
  text-align:center;
  padding:28px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(10px);
  border-radius:16px;
}

h1{
  font-size:22px;
  margin:0;
}

p{
  color:#aaa;
  margin-top:8px;
  font-size:14px;
}

.bar{
  margin-top:15px;
  width:220px;
  height:4px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
}

.bar span{
  display:block;
  height:100%;
  width:0;
  background:#fff;
  animation:load 4.8s linear forwards;
}

@keyframes load{
  100%{width:100%}
}

.small{
  margin-top:10px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="box">
  <h1>Prayatna’s Blog is now Prayatna's Journal</h1>
  <p>System update in progress...</p>

  <div class="bar"><span></span></div>

  <div class="small">Redirecting to journal.html</div>
</div>

<script>
// particles
for(let i=0;i<40;i++){
  const d=document.createElement('div');
  d.className='p';
  d.style.left=Math.random()*100+'vw';
  d.style.animationDuration=(3+Math.random()*5)+'s';
  d.style.opacity=Math.random();
  document.body.appendChild(d);
}

// redirect
setTimeout(()=>{
  window.location.href="journal.html";
},4800);
</script>

</body>
</html>
